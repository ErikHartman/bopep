# ProteomeSearch Default Configuration
# This file contains default parameters for proteome-based peptide search

# Peptide sampling parameters
min_peptide_length: 8
max_peptide_length: 25
length_distribution: 'uniform'  # 'uniform' or 'normal'

# Initial sampling
n_init: 50  # Number of initial peptides to sample from proteome

# Selection parameters
selection:
  m_select: 10              # Number of candidates to dock per iteration
  k_propose: 10000          # Number of peptides to sample from proteome per iteration

# Surrogate model configuration
surrogate_model:
  model_type: 'deep_evidential'
  network_type: 'bigru'
  n_trials: 100
  n_splits: 5
  hpo_interval: 10          # Re-optimize hyperparameters every N iterations

# Embedding configuration
embedding:
  method: 'esm'
  batch_size: 64
  model_path: null
  device: null
  pca_n_components: 100

# Validation parameters
validation:
  n_validate: 0.2
  min_validation_samples: 10
  min_training_samples: 50

# Scoring configuration
scoring:
  scores_to_include: null  # List of scores to compute, must be provided by user
  required_n_contact_residues: 5
  binding_site_distance_threshold: 5
  n_jobs: 12
  receptor_chain: 'A'
  sequence_chain: 'B'

# Docker/Docking configuration
docker:
  models:
    - 'boltz'
  output_dir: './proteome_search_docking'
  num_models: 3
  num_recycles: 5
  diffusion_samples: 3
  recycling_steps: 5
  gpu_ids: null
  save_raw: false
  force: false

# Logging configuration
logging:
  log_dir: './proteome_search_logs'
