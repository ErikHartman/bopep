# ProteomeSearch Default Configuration
# This file contains default parameters for proteome-based peptide search

# Peptide sampling parameters
min_peptide_length: 8
max_peptide_length: 35
length_distribution: 'uniform'  # 'uniform' or 'normal'

# Initial sampling
n_init: 500  # Number of initial peptides to sample from proteome

# Selection parameters
selection:
  m_select: 10              # Number of candidates to dock per iteration
  k_propose: 10000          # Number of peptides to sample from proteome per iteration
  local_sampling_fraction: 0.2  # Fraction of k_propose to sample locally around top scorers
  n_top_scorers_for_local: 100  # Number of top-scoring peptides to sample around
  local_position_std: 5     # Standard deviation for Gaussian perturbation of position
  local_length_std: 2       # Standard deviation for Gaussian perturbation of length

# Surrogate model configuration
surrogate_model:
  model_type: 'deep_evidential'
  network_type: 'bigru'
  n_trials: 100
  n_splits: 5
  hpo_interval: 25          # Re-optimize hyperparameters every N iterations

# Embedding configuration
embedding:
  method: 'esm'
  batch_size: 64
  model_path: null
  device: null
  pca_n_components: 100

# Validation parameters
validation:
  n_validate: 0.2
  min_validation_samples: 10
  min_training_samples: 50

# Scoring configuration
scoring:
  scores_to_include: null  # List of scores to compute, must be provided by user
  required_n_contact_residues: 8
  binding_site_distance_threshold: 5
  n_jobs: 12
  receptor_chain: 'A'
  sequence_chain: 'B'

# Docker/Docking configuration
docker:
  models:
    - 'boltz'
  output_dir: './proteome_search_docking'
  num_models: 5
  num_recycles: 10
  diffusion_samples: 5
  recycling_steps: 10
  gpu_ids: null
  save_raw: false
  force: false

# Logging configuration
logging:
  log_dir: './proteome_search_logs'
  continue_from_logs: null  # Path to previous log directory to resume from
